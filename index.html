  body{
    background-color: #55988b;}

<body align="center">
  <form action="">
    <table width="650px" height="350" align="center">
      <tr bgcolor="orange" align="center">
        <td colspan="2">PHIẾU KHẢO SÁT</td>
      </tr>
      <tr>
        <td> Họ và tên </td>
        <td> <input type="text" name="name" placeholder="Nhập tên của bạn"> </td>
      </tr>
      <tr>
        <td> Email </td>
        <td> <input type="email" name="email" placeholder="Nhập email của bạn">  </td>
      </tr>
      <tr>
        <td> Số điện thoại </td>
        <td> <input type="tel" name="sdt" placeholder="Nhập số điện thoại của bạn"> </td>
      </tr>
      <tr>
        <td> Giới tính </td>
        <td> <input type="checkbox" value="male" id="male">          <label for="male">Nam</label>
            <input type="checkbox" value="female" id="female">      <label for="female">Nữ</label></td>
      </tr>
        <tr>
        <td> Kỹ năng </td>
        <td> <input type="checkbox">Javascript 
             <input type="checkbox">HTML 
             <input type="checkbox">CSS 
             <input type="checkbox">Python 
        </td>
      </tr>
      <tr>
        <td> Ngày sinh </td>
        <td> <input type="date"> </td>
      </tr>
      <tr>
        <td> Miêu tả </td>
        <td> <textarea name="desc" placeholder="Mô tả về bản thân" rows="5" cols="67"></textarea> </td>
      </tr>
      <tr bgcolor="orange">
        <td colspan="2" align="center">
          <input type="Submit">
          <input type="Reset">
        </td>
      </tr>
    </table>
  </form>
